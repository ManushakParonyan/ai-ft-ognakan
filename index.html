<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ՖՏ օգնական · Գործուղումների կարգ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #F4EFE3;
    font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px 12px;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 48px);
    max-height: 760px;
    width: 100%;
    max-width: 640px;
    background: #FFFDF9;
    border: 1px solid #E8E1D3;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(120,100,70,0.08);
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 22px;
    border-bottom: 1px solid #EFE9DC;
    background: #FBF7EE;
  }

  .logo-box {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, #5B9C8F, #3D7568);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .header-text { flex: 1; min-width: 0; }

  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: #332B1F;
  }

  .header-subtitle {
    font-size: 12px;
    color: #9A8F76;
  }

  .clear-btn {
    font-size: 12px;
    color: #7A6F58;
    background: #FFFFFF;
    border: 1px solid #E8E1D3;
    border-radius: 10px;
    padding: 7px 13px;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
  }
  .clear-btn:hover { background: #F4EFE3; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: #FFFDF9;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: #E8E1D3; border-radius: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }

  .msg-block {
    max-width: 82%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg-block.user { align-self: flex-end; }
  .msg-block.assistant { align-self: flex-start; }

  .bubble {
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    padding: 12px 16px;
  }
  .msg-block.user .bubble {
    background: #3D7568;
    color: #FFFFFF;
    border-radius: 16px 16px 4px 16px;
  }
  .msg-block.assistant .bubble {
    background: #F4EFE3;
    color: #3A3325;
    border-radius: 16px 16px 16px 4px;
  }

  .citation-card {
    background: #F2F7F4;
    border: 1px solid #D6E6DF;
    border-radius: 12px;
    padding: 12px 15px;
  }
  .citation-head {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 6px;
  }
  .citation-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3D7568;
    flex-shrink: 0;
  }
  .citation-section {
    font-size: 12px;
    font-weight: 700;
    color: #3D7568;
  }
  .citation-quote {
    font-size: 13px;
    line-height: 1.6;
    color: #5C6B64;
  }

  .typing-dots {
    background: #F4EFE3;
    border-radius: 16px 16px 16px 4px;
    padding: 14px 16px;
    display: flex;
    gap: 5px;
    width: fit-content;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #9A8F76;
    animation: pulse 1.1s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-2px); }
  }

  .error-box {
    align-self: center;
    font-size: 13px;
    color: #A14B3A;
    border: 1px solid #EFC4B8;
    background: #FBEEE9;
    border-radius: 10px;
    padding: 9px 15px;
  }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 6px;
  }
  .suggestions-label {
    font-size: 12px;
    color: #B5A98E;
    margin-bottom: 2px;
  }
  .suggestion-btn {
    text-align: left;
    background: #FFFFFF;
    border: 1px solid #EFE9DC;
    border-radius: 12px;
    padding: 11px 15px;
    font-size: 13.5px;
    color: #5C5340;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .suggestion-btn:hover {
    background: #F4EFE3;
    border-color: #D8CDB0;
  }

  .input-row {
    border-top: 1px solid #EFE9DC;
    padding: 14px 18px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #FBF7EE;
  }

  textarea {
    flex: 1;
    resize: none;
    border: 1px solid #E8E1D3;
    background: #FFFFFF;
    border-radius: 14px;
    padding: 11px 16px;
    font-size: 14.5px;
    font-family: inherit;
    color: #332B1F;
    max-height: 140px;
  }
  textarea:focus { outline: none; border-color: #3D7568; }
  textarea::placeholder { color: #B5A98E; }

  button.send {
    background: linear-gradient(135deg, #5B9C8F, #3D7568);
    color: #FFFFFF;
    border: none;
    border-radius: 14px;
    padding: 11px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    height: 45px;
    font-family: inherit;
  }
  button.send:disabled {
    background: #E8E1D3;
    color: #B5A98E;
    cursor: default;
  }
  button.send:active:not(:disabled) { transform: scale(0.96); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo-box">&#9992;&#65039;</div>
    <div class="header-text">
      <div class="header-title">AI ՖՏ օգնական</div>
      <div class="header-subtitle">Գործուղումների կարգի վերաբերյալ հարցեր</div>
    </div>
    <button class="clear-btn" id="clearBtn">Նոր զրույց</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Գրեք Ձեր հարցը..."></textarea>
    <button class="send" id="sendBtn">Ուղարկել</button>
  </div>
</div>

<script>
  const INITIAL_MESSAGE = "Բարև Ձեզ \u{1F44B} Ես AI ՖՏ օգնականն եմ։ Կպատասխանեմ Ձեր հարցերին գործուղումների կազմակերպման և ծախսերի հատուցման կարգի հիման վրա։ Ինչով կարող եմ օգնել ձեզ այսօր?";

  const SUGGESTIONS = [
    "Ինչքան է գիշերավարձի փոխհատուցումը",
    "Ինչքան է օրապահիկը Գերմանիայում",
    "Ինչ փաստաթղթեր են պետք վերադառնալուց հետո",
  ];

  let history = [{ role: "assistant", text: INITIAL_MESSAGE, citations: [] }];

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const clearBtn = document.getElementById("clearBtn");

  function parseReply(raw) {
    const marker = "[[CITATION]]";
    const idx = raw.indexOf(marker);
    if (idx === -1) {
      return { text: raw.trim(), citations: [] };
    }
    const text = raw.slice(0, idx).trim();
    const jsonPart = raw.slice(idx + marker.length).trim();
    try {
      const parsed = JSON.parse(jsonPart);
      const citations = Array.isArray(parsed) ? parsed : [parsed];
      return { text, citations };
    } catch (e) {
      return { text, citations: [] };
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function citationCardHtml(c) {
    const section = c.section ? escapeHtml(c.section) : "Աղբյուր";
    const quote = c.quote ? escapeHtml(c.quote) : "";
    return (
      '<div class="citation-card">' +
        '<div class="citation-head">' +
          '<span class="citation-dot"></span>' +
          '<span class="citation-section">' + section + '</span>' +
        '</div>' +
        (quote ? '<div class="citation-quote">' + quote + '</div>' : '') +
      '</div>'
    );
  }

  function render() {
    messagesEl.innerHTML = "";

    for (const m of history) {
      const block = document.createElement("div");
      block.className = "msg-block " + m.role;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = m.text;
      block.appendChild(bubble);

      if (m.citations && m.citations.length > 0) {
        const citWrap = document.createElement("div");
        citWrap.style.display = "flex";
        citWrap.style.flexDirection = "column";
        citWrap.style.gap = "8px";
        citWrap.innerHTML = m.citations.map(citationCardHtml).join("");
        block.appendChild(citWrap);
      }

      messagesEl.appendChild(block);
    }

    if (history.length === 1) {
      const sugWrap = document.createElement("div");
      sugWrap.className = "suggestions";

      const label = document.createElement("div");
      label.className = "suggestions-label";
      label.textContent = "Փորձեք հարցնել.";
      sugWrap.appendChild(label);

      for (const s of SUGGESTIONS) {
        const btn = document.createElement("button");
        btn.className = "suggestion-btn";
        btn.textContent = s;
        btn.addEventListener("click", () => {
          inputEl.value = s;
          inputEl.focus();
        });
        sugWrap.appendChild(btn);
      }
      messagesEl.appendChild(sugWrap);
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const block = document.createElement("div");
    block.className = "msg-block assistant";
    block.id = "typingBlock";
    block.innerHTML =
      '<div class="typing-dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    messagesEl.appendChild(block);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typingBlock");
    if (el) el.remove();
  }

  function showError(text) {
    const box = document.createElement("div");
    box.className = "error-box";
    box.textContent = text;
    messagesEl.appendChild(box);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    history.push({ role: "user", text: text, citations: [] });
    inputEl.value = "";
    inputEl.style.height = "auto";
    render();

    sendBtn.disabled = true;
    showTyping();

    try {
      const apiMessages = history.map((m) => ({ role: m.role, content: m.text }));

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: apiMessages }),
      });

      const data = await response.json();
      hideTyping();

      if (!response.ok) {
        throw new Error(data.error || "Unknown error");
      }

      const { text: replyText, citations } = parseReply(data.reply);
      history.push({ role: "assistant", text: replyText, citations: citations });
      render();
    } catch (err) {
      hideTyping();
      showError("Կապի խնդիր առաջացավ։ Փորձեք կրկին։");
      console.error(err);
    } finally {
      sendBtn.disabled = false;
    }
  }

  function resetChat() {
    history = [{ role: "assistant", text: INITIAL_MESSAGE, citations: [] }];
    render();
  }

  sendBtn.addEventListener("click", sendMessage);
  clearBtn.addEventListener("click", resetChat);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });

  render();
</script>

</body>
</html>
